name: Update TSM ADR data

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC time.
    # 23:45 UTC is 07:45 Taipei time the next day, after the US market close.
    - cron: "45 23 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python file head for debugging
        run: |
          python --version
          sed -n '1,40p' scripts/fetch_tsm.py

      - name: Fetch TSM ADR daily OHLC data
        run: python scripts/fetch_tsm.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tsm-*.json data/README.txt
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update TSM ADR market data"
            git push
          fi
