name: Update TSM ADR data

on:
  workflow_dispatch:
  schedule:
    # UTC 23:45 = 台北隔天 07:45；美股收盤後更新日 K 資料。
    - cron: "45 23 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch TSM ADR daily OHLC data
        run: python scripts/fetch_tsm.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tsm-*.json data/README.txt
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update TSM ADR market data"
            git push
          fi
