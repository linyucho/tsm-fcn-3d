name: Update ADR market data

on:
  workflow_dispatch:
  schedule:
    # 每小時更新一次資料檔。GitHub Pages 是靜態網站；網頁重整會讀取最新已產生的 JSON。
    - cron: "15 * * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch ADR daily OHLC data
        run: python scripts/fetch_tsm.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/README.txt
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update ADR market data"
            git push
          fi
